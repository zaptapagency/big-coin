# BigCoin seed-node configuration  ->  /etc/bigcoin/bigcoin.conf
# A "seed node" is a permanently-online full node that new nodes connect to
# in order to discover the rest of the network. Run 2-5 of these on separate VPS
# hosts and hard-code their IPs into chainparams.cpp (vSeeds / vFixedSeeds) or a
# DNS seeder before public launch.

# --- Identity / behaviour ---
server=1
daemon=1
listen=1
txindex=1                 # required if this node also backs the block explorer
dbcache=512               # RAM for the UTXO cache (MB); raise on bigger VPS

# --- P2P: accept inbound connections from the whole internet ---
port=9444
bind=0.0.0.0
maxconnections=125
# discover=1 lets the node advertise its own public address to peers.
discover=1
# listenonion=0            # set 1 + torcontrol if running behind Tor

# --- Peer the seed nodes to each other (replace with your real seed IPs) ---
# addnode=SEED_A_PUBLIC_IP
# addnode=SEED_B_PUBLIC_IP
# addnode=SEED_C_PUBLIC_IP

# --- RPC: KEEP PRIVATE. Only localhost + the explorer host. ---
rpcport=9445
rpcbind=127.0.0.1
rpcallowip=127.0.0.1
# Generate a strong credential pair, do NOT reuse this example:
rpcuser=CHANGE_ME_user
rpcpassword=CHANGE_ME_LONG_RANDOM_64_CHARS
# Better: use rpcauth= (hashed) instead of a plaintext password. Generate with
# the share/rpcauth/rpcauth.py helper from the source tree.

# --- Logging ---
# debug=net               # uncomment to debug peer connectivity
shrinkdebugfile=1
