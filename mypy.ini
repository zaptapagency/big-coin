[mypy]
python_version = 3.11
# Root-level ad-hoc script test_gui.py shares its module name with the real
# suite at tests/test_gui.py; exclude it so mypy does not abort on the clash.
exclude = (?x)(^test_gui\.py$)
ignore_missing_imports = True
warn_unused_ignores = False
check_untyped_defs = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
warn_return_any = False
warn_no_return = False
no_implicit_optional = False
strict = False
